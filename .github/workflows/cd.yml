name: CD

on:
  push:
    tags: ["v*"]

jobs:
  publish-sandbox-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .container/sandbox.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/sandbox:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/sandbox:latest
