[coder]
claude_model = "claude-opus-4-7"

[loop]
max_iterations = 3

[delivery]
base_branch = "main"
branch_prefix = "resolv/issue-"

[sandbox]
image_tag = "resolv-sandbox:latest"
test_timeout_seconds = 600
install_timeout_seconds = 900

[webhook]
trigger_phrase = "/resolv fix"
host = "0.0.0.0"
port = 8080
